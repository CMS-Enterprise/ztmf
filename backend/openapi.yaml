info:
  description: API for the Zero Trust Maturity Framework (ZTMF).
  title: ZTMF API
  version: 1.0.0
openapi: 3.1.0
paths:
  /auth/lookup:
    get:
      description: 'Unauthenticated pre-auth lookup the landing page uses to route
        a browser to the correct IdP login path. Unknown, unprovisioned, and soft-deleted
        emails all return a null idp, so it cannot be used to enumerate accounts.
        This is the one public route: it deliberately has no bearerAuth security.'
      parameters:
      - description: Email address to resolve
        in: query
        name: email
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-controller_idpLookupResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      summary: Resolve the identity provider for an email
      tags:
      - auth
  /datacalls:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-array_model_DataCall'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: List all data calls
      tags:
      - datacalls
    post:
      parameters:
      - description: Data call ID (for update)
        in: path
        name: datacallid
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/model.DataCall'
                description: Data call to save
                summary: body
        description: Data call to save
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-model_DataCall'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Bad Request
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Create or update a data call
      tags:
      - datacalls
  /datacalls/{datacallid}:
    get:
      parameters:
      - description: Data call ID
        in: path
        name: datacallid
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-model_DataCall'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Get a data call by ID
      tags:
      - datacalls
    put:
      parameters:
      - description: Data call ID (for update)
        in: path
        name: datacallid
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/model.DataCall'
                description: Data call to save
                summary: body
        description: Data call to save
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-model_DataCall'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Bad Request
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Create or update a data call
      tags:
      - datacalls
  /datacalls/{datacallid}/export:
    get:
      parameters:
      - description: Data call ID
        in: path
        name: datacallid
        required: true
        schema:
          type: integer
      - description: FISMA system IDs to filter by
        in: query
        name: fsids
        schema:
          items:
            type: integer
          type: array
      responses:
        "200":
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
          description: xlsx spreadsheet of the data call's answers
        "500":
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Export a data call's answers as an xlsx spreadsheet
      tags:
      - datacalls
  /datacalls/{datacallid}/fismasystems:
    get:
      parameters:
      - description: Data call ID
        in: path
        name: datacallid
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-array_model_FismaSystem'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: List FISMA systems that have completed a data call
      tags:
      - datacalls
  /datacalls/{datacallid}/fismasystems/{fismasystemid}:
    put:
      parameters:
      - description: Data call ID
        in: path
        name: datacallid
        required: true
        schema:
          type: integer
      - description: FISMA system ID
        in: path
        name: fismasystemid
        required: true
        schema:
          type: integer
      responses:
        "204":
          description: No Content
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Mark a FISMA system as having completed a data call
      tags:
      - datacalls
  /datacalls/latest:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-model_DataCall'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Get the latest data call
      tags:
      - datacalls
  /events:
    get:
      parameters:
      - description: Filter by initiating user ID
        in: query
        name: userid
        schema:
          type: string
      - description: 'Filter by action: created, updated, or deleted'
        in: query
        name: action
        schema:
          type: string
      - description: Filter by affected resource (table name)
        in: query
        name: resource
        schema:
          type: string
      - description: Filter by FISMA system ID referenced in the event payload
        in: query
        name: payload.fismasystemid
        schema:
          type: integer
      - description: Filter by score ID referenced in the event payload
        in: query
        name: payload.scoreid
        schema:
          type: integer
      - description: Filter by data call ID referenced in the event payload
        in: query
        name: payload.datacallid
        schema:
          type: integer
      - description: Filter by question ID referenced in the event payload
        in: query
        name: payload.questionid
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-array_model_Event'
          description: OK
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: List audit-trail events
      tags:
      - events
  /fismasystems:
    get:
      parameters:
      - description: Filter by decommissioned status
        in: query
        name: decommissioned
        schema:
          type: boolean
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-array_model_FismaSystem'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: List all FISMA systems
      tags:
      - fismasystems
    post:
      parameters:
      - description: FISMA system ID (update only)
        in: path
        name: fismasystemid
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/model.FismaSystem'
                description: FISMA system to save
                summary: body
        description: FISMA system to save
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-model_FismaSystem'
          description: Created
        "204":
          description: No Content
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Bad Request
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Forbidden
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Create or update a FISMA system
      tags:
      - fismasystems
  /fismasystems/{fismasystemid}:
    delete:
      parameters:
      - description: FISMA system ID
        in: path
        name: fismasystemid
        required: true
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/controller.DecommissionRequest'
                description: Optional decommission parameters
                summary: body
        description: Optional decommission parameters
      responses:
        "204":
          description: No Content
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Bad Request
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Forbidden
        "404":
          content:
