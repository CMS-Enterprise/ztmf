          items:
            type: integer
          type: array
          uniqueItems: false
      type: object
    model.AuditRef:
      properties:
        email:
          type: string
        name:
          type: string
        role:
          type: string
        userid:
          type: string
      type: object
    model.DataCall:
      properties:
        datacall:
          type: string
        datacallid:
          type: integer
        datecreated:
          type: string
        deadline:
          type: string
      type: object
    model.Event:
      properties:
        action:
          description: the action they took
          type: string
        createdat:
          description: at what date and time
          type: string
        payload:
          description: incoming data
        type:
          description: on what resource
          type: string
        userid:
          description: who initiated the event
          type: string
      type: object
    model.FismaSystem:
      properties:
        cloud_service_model:
          type: string
        cloud_system:
          type: string
        cloud_vendor:
          type: string
        component:
          type: string
        datacallcontact:
          type: string
        datacenterenvironment:
          type: string
        decommissioned:
          type: boolean
        decommissioned_by:
          type: string
        decommissioned_date:
          type: string
        decommissioned_notes:
          type: string
        divisionname:
          type: string
        fips:
          type: string
        fismaacronym:
          type: string
        fismaname:
          type: string
        fismasubsystem:
          type: string
        fismasystemid:
          type: integer
        fismauid:
          type: string
        goco_coco_gogo:
          type: string
        groupacronym:
          type: string
        groupname:
          type: string
        hva:
          type: string
        issoemail:
          type: string
        legacy:
          type: string
        opdiv_id:
          type: integer
        reactivated_by:
          type: string
        reactivated_date:
          type: string
        reactivation_notes:
          type: string
        sdl_sync_enabled:
          type: boolean
        system_operator:
          type: string
        system_owner:
          type: string
        system_owner_email:
          type: string
        system_type:
          type: string
      type: object
    model.Function:
      properties:
        datacenterenvironment:
          type: string
        description:
          type: string
        function:
          type: string
        functionid:
          type: integer
        order:
          type: integer
        pillarid:
          type: integer
        questionid:
          type: integer
      type: object
    model.FunctionOption:
      properties:
        description:
          type: string
        functionid:
          type: integer
        functionoptionid:
          type: integer
        optionname:
          type: string
        score:
          type: integer
      type: object
    model.MassEmail:
      properties:
        body:
          type: string
        datesent:
          type: string
        group:
          type: string
        massemailid:
          type: integer
        subject:
          type: string
      type: object
    model.OpDiv:
      properties:
        active:
          type: boolean
        code:
          type: string
        insights_enabled:
          description: |-
            InsightsEnabled gates whether system_enrichment (ZTMF Insights) is served
            for systems in this OpDiv. Pointer for the same reason as IsParent/Active:
            an update that omits it must leave the column untouched, not reset it to
            false (which would silently disable enrichment for an enabled OpDiv).
          type: boolean
        is_parent:
          description: |-
            IsParent and Active are pointers so an update can distinguish "not supplied"
            (nil, leave the column untouched) from an explicit false. With a non-pointer
            bool, any update that omits the field defaults to false: omitting is_parent
            would demote the HHS parent OpDiv (which drives HHS-wide authorization), and
            omitting active would silently deactivate an active OpDiv.
          type: boolean
        name:
          type: string
        opdiv_id:
          type: integer
      type: object
    model.Pillar:
      properties:
        order:
          type: integer
        pillar:
          type: string
        pillarid:
          type: integer
      type: object
    model.PillarScore:
      properties:
        pillar:
          type: string
        pillarid:
          type: integer
        score:
          type: number
        tier:
          type: string
      type: object
    model.Question:
      properties:
        function:
          $ref: '#/components/schemas/model.Function'
        notesprompt:
          type: string
        order:
          type: integer
        pillar:
          $ref: '#/components/schemas/model.Pillar'
        pillarid:
          type: integer
        question:
          type: string
        questionid:
          type: integer
      type: object
    model.Score:
      properties:
        datacallid:
          type: integer
        datecalculated:
          type: number
        fismasystemid:
          type: integer
        functionoption:
          $ref: '#/components/schemas/model.FunctionOption'
        functionoptionid:
          type: integer
        last_edited_at:
          type: string
        last_edited_by:
          $ref: '#/components/schemas/model.AuditRef'
        notes:
          type: string
        notes_is_ai_summary:
          type: boolean
        scoreid:
          type: integer
      type: object
    model.ScoreAggregate:
      properties:
        datacallid:
          type: integer
        fismasystemid:
          type: integer
        pillarscores:
          items:
            $ref: '#/components/schemas/model.PillarScore'
          type: array
          uniqueItems: false
        systemscore:
          type: number
        systemtier:
          type: string
      type: object
    model.ScoreDiff:
      properties:
        changed_at:
          type: string
        changed_by:
          $ref: '#/components/schemas/model.AuditRef'
        fismasystemid:
          type: integer
        from:
          $ref: '#/components/schemas/model.ScoreDiffSide'
        function:
          type: string
        functionid:
          type: integer
        question:
          type: string
        to:
          $ref: '#/components/schemas/model.ScoreDiffSide'
      type: object
    model.ScoreDiffSide:
      properties:
        functionoptionid:
          type: integer
        notes:
          type: string
        notes_is_ai_summary:
          type: boolean
        optionname:
          type: string
        score:
          type: integer
        scoreid:
          type: integer
      type: object
    model.SystemEnrichment:
      properties:
        fisma_uuid:
          type: string
        payload:
          type: object
        synced_at:
          type: string
      type: object
    model.User:
      properties:
        assignedopdivids:
          items:
            type: integer
          type: array
          uniqueItems: false
        deleted:
          type: boolean
        email:
          type: string
        fullname:
          type: string
        identity_provider:
          type: string
        role:
          type: string
        userid:
          type: string
      type: object
    model.UserFismaSystem:
      properties:
        fismasystemid:
          type: integer
        userid:
          type: string
      type: object
    model.UserOpDiv:
      properties:
        granted_by:
          type: string
        opdiv_id:
          type: integer
        userid:
          type: string
      type: object
  securitySchemes:
    bearerAuth:
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
