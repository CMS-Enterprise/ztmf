openapi: 3.0.0
info:
  title: ZTMF API
  description: API for Zero Trust Maturity Framework
  version: 1.0.0
servers:
  - url: /api/v1
    description: Base API path
paths:
  /datacalls:
    get:
      summary: List all data calls
      description: Returns a list of all data calls
      operationId: listDataCalls
      responses:
        '200':
          description: A list of data calls
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DataCall'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      summary: Create a new data call
      description: Creates a new data call (Admin only)
      operationId: createDataCall
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataCall'
      responses:
        '201':
          description: Data call created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/DataCall'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
  /datacalls/latest:
    get:
      summary: Get the latest data call
      description: Returns the most recent data call
      operationId: getLatestDataCall
      responses:
        '200':
          description: The latest data call
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/DataCall'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /datacalls/{datacallid}:
    get:
      summary: Get a data call by ID
      description: Returns a specific data call by ID
      operationId: getDataCallById
      parameters:
        - name: datacallid
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: A data call
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/DataCall'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      summary: Update a data call
      description: Updates an existing data call (Admin only)
      operationId: updateDataCall
      security:
        - bearerAuth: []
      parameters:
        - name: datacallid
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataCall'
      responses:
        '204':
          description: Data call updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /datacalls/{datacallid}/fismasystems/{fismasystemid}:
    put:
      summary: Complete a data call for a FISMA system
      description: Marks a data call as completed for a specific FISMA system
      operationId: completeDataCall
      security:
        - bearerAuth: []
      parameters:
        - name: datacallid
          in: path
          required: true
          schema:
            type: integer
            format: int32
        - name: fismasystemid
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: Data call completed for FISMA system
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /datacalls/{datacallid}/fismasystems:
    get:
      summary: List completed FISMA systems for a data call
      description: Returns a list of FISMA systems that have completed a specific data call
      operationId: listCompletedFismaSystems
      parameters:
        - name: datacallid
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: A list of completed FISMA systems
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FismaSystem'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /datacalls/{datacallid}/export:
    get:
      summary: Export data call results
      description: Exports data call results to Excel format
      operationId: exportDataCall
      parameters:
        - name: datacallid
          in: path
          required: true
          schema:
            type: integer
            format: int32
        - name: fsids
          in: query
          required: false
          schema:
            type: array
            items:
              type: integer
              format: int32
          description: Filter by FISMA system IDs
      responses:
        '200':
          description: Excel file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /fismasystems:
    get:
      summary: List FISMA systems
      description: Returns a list of FISMA systems (filtered by user access if not admin)
      operationId: listFismaSystems
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of FISMA systems
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FismaSystem'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      summary: Create a new FISMA system
      description: Creates a new FISMA system (Admin only)
      operationId: createFismaSystem
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FismaSystem'
      responses:
        '201':
          description: FISMA system created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FismaSystem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
  /fismasystems/{fismasystemid}:
    get:
      summary: Get a FISMA system by ID
      description: Returns a specific FISMA system by ID
      operationId: getFismaSystemById
      security:
        - bearerAuth: []
      parameters:
        - name: fismasystemid
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: A FISMA system
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FismaSystem'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      summary: Update a FISMA system
      description: Updates an existing FISMA system (Admin only)
      operationId: updateFismaSystem
      security:
        - bearerAuth: []
      parameters:
        - name: fismasystemid
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FismaSystem'
      responses:
        '204':
          description: FISMA system updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      summary: Decommission a FISMA system
      description: Marks a FISMA system as decommissioned with optional date and notes (Admin only)
      operationId: deleteFismaSystem
      security:
        - bearerAuth: []
      parameters:
        - name: fismasystemid
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                decommissioned_date:
                  type: string
                  format: date-time
                  description: Custom decommission date (defaults to now)
                notes:
                  type: string
                  description: Reason or notes for decommissioning
      responses:
        '200':
          description: FISMA system decommissioned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FismaSystem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /fismasystems/{fismasystemid}/reactivate:
    put:
      summary: Reactivate a decommissioned FISMA system
      description: Clears the decommissioned flag on a FISMA system and stamps reactivation audit columns (Admin only). Decommission audit columns are preserved for history.
      operationId: reactivateFismaSystem
      security:
        - bearerAuth: []
      parameters:
        - name: fismasystemid
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
                  description: Reason or notes for reactivation
      responses:
        '200':
          description: FISMA system reactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FismaSystem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /fismasystems/{fismasystemid}/datacalls:
    get:
      summary: List completed data calls for a FISMA system
      description: Returns a list of data calls that have been completed by a specific FISMA system
      operationId: listCompleteDataCalls
      parameters:
        - name: fismasystemid
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: A list of completed data calls
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DataCall'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /fismasystems/{fismasystemid}/questions:
    get:
      summary: List questions for a FISMA system
      description: Returns a list of questions relevant to a specific FISMA system
      operationId: listFismaSystemQuestions
      parameters:
        - name: fismasystemid
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: A list of questions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Question'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /functions/{functionid}/options:
    get:
      summary: List options for a function
      description: Returns a list of options for a specific function
      operationId: listFunctionOptions
      parameters:
        - name: functionid
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: A list of function options
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FunctionOption'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /opdivs:
    get:
      summary: List OpDivs
      description: |
        Returns the reference list of HHS Operating Divisions plus the HHS
        parent row. Used by the admin panel for OpDiv selectors and by the
        onboarding workbook importer to validate opdiv codes. Open to any
        authenticated user; contains no sensitive data.
      operationId: listOpDivs
      security:
        - bearerAuth: []
      parameters:
        - name: active_only
          in: query
          required: false
          description: When true (default), only returns rows with active=true.
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: OpDiv list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OpDiv'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      summary: Create an OpDiv
      description: |
        Creates a new Operating Division. OWNER only - the OpDiv list is the
        tenant boundary. A new OpDiv is always created active. Returns 400 with
        a field-level message (data.code) if the code is missing/too long or
        already in use by another active OpDiv.
      operationId: createOpDiv
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpDivInput'
      responses:
        '201':
          description: Created OpDiv
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OpDiv'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'
  /opdivs/{opdiv_id}:
    put:
      summary: Update or deactivate an OpDiv
      description: |
        Updates an OpDiv's code/name/is_parent/active. OWNER only. Set
        active=false to deactivate (soft) rather than delete. Returns 204.
      operationId: updateOpDiv
      security:
        - bearerAuth: []
      parameters:
        - name: opdiv_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpDivInput'
      responses:
        '204':
          description: Updated (no body)
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /users:
    get:
      summary: List users
      description: Returns a list of users
      operationId: listUsers
      security:
        - bearerAuth: []
      parameters:
        - name: email
          in: query
          required: false
          schema:
            type: string
        - name: fullname
          in: query
          required: false
          schema:
            type: string
        - name: role
          in: query
          required: false
          schema:
            type: string
        - name: deleted
          in: query
          required: false
          schema:
            type: boolean
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      summary: Create a new user
      description: Creates a new user
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /users/current:
    get:
      summary: Get current user
      description: Returns the currently authenticated user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /users/{userid}:
    get:
      summary: Get a user by ID
      description: Returns a specific user by ID
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string
            pattern: '[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+'
      responses:
        '200':
          description: A user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      summary: Update a user
      description: Updates an existing user
      operationId: updateUser
      security:
        - bearerAuth: []
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string
            pattern: '[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '204':
          description: User updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      summary: Delete a user
      description: Marks a user as deleted
      operationId: deleteUser
      security:
        - bearerAuth: []
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string
            pattern: '[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+'
      responses:
        '204':
          description: User deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /users/{userid}/restore:
    put:
      summary: Restore a soft-deleted user
      description: Clears the deleted flag on a user (Admin only). Audit history is captured automatically in the events table.
      operationId: restoreUser
      security:
        - bearerAuth: []
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string
            pattern: '[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+'
      responses:
        '200':
          description: User restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /users/{userid}/assignedfismasystems:
    get:
      summary: List FISMA systems assigned to a user
      description: Returns a list of FISMA systems assigned to a specific user
      operationId: listUserFismaSystems
      security:
        - bearerAuth: []
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string
            pattern: '[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+'
      responses:
        '200':
          description: A list of FISMA system IDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: integer
                      format: int32
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      summary: Assign a FISMA system to a user
      description: Assigns a FISMA system to a specific user
      operationId: assignFismaSystemToUser
      security:
        - bearerAuth: []
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string
            pattern: '[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserFismaSystem'
      responses:
        '201':
          description: FISMA system assigned to user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserFismaSystem'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /users/{userid}/assignedfismasystems/{fismasystemid}:
    delete:
      summary: Remove a FISMA system assignment from a user
      description: Removes a FISMA system assignment from a specific user
      operationId: removeFismaSystemFromUser
      security:
        - bearerAuth: []
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string
            pattern: '[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+'
        - name: fismasystemid
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: FISMA system assignment removed
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /users/{userid}/assignedopdivs:
    get:
      summary: List a user's OpDiv grants
      description: |
        Returns the OpDiv ids a user holds grants for. Unscoped admins may view
        any user; an OpDiv-scoped admin may only view a user who shares one of
        their OpDivs.
      operationId: listUserOpDivs
      security:
        - bearerAuth: []
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string
            pattern: '[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+'
      responses:
        '200':
          description: A list of OpDiv ids
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: integer
                      format: int32
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      summary: Grant a user OpDiv membership
      description: |
        Grants the user membership in an OpDiv (idempotent). Unscoped admins may
        grant any OpDiv; an OPDIV_ADMIN may only grant an OpDiv they themselves
        hold and only onto a user whose tier is within their assignable set.
        Granting recomputes the user's identity_provider from their OpDiv set
        (CMS -> okta, otherwise entra).
      operationId: grantUserOpDiv
      security:
        - bearerAuth: []
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string
            pattern: '[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                opdiv_id:
                  type: integer
                  format: int32
              required:
                - opdiv_id
      responses:
        '201':
          description: OpDiv granted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserOpDiv'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
  /users/{userid}/assignedopdivs/{opdiv_id}:
    delete:
      summary: Revoke a user's OpDiv grant
      description: |
        Revokes a user's OpDiv membership (idempotent). Same scope as granting:
        an OPDIV_ADMIN may only revoke an OpDiv they hold. Recomputes the user's
        identity_provider afterward.
      operationId: revokeUserOpDiv
      security:
        - bearerAuth: []
      parameters:
        - name: userid
          in: path
          required: true
          schema:
            type: string
            pattern: '[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+'
        - name: opdiv_id
          in: path
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '204':
          description: OpDiv grant revoked
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
