    controller.apiResponse-model_UserOpDiv:
      properties:
        data:
          $ref: '#/components/schemas/model.UserOpDiv'
        error:
          type: string
      type: object
    controller.idpLookupResponse:
      properties:
        idp:
          type: string
      type: object
    controller.setUserOpDivsInput:
      properties:
        opdiv_ids:
          items:
            type: integer
          type: array
          uniqueItems: false
      type: object
    model.AuditRef:
      properties:
        email:
          type: string
        name:
          type: string
        role:
          type: string
        userid:
          type: string
      type: object
    model.DataCall:
      properties:
        datacall:
          type: string
        datacallid:
          type: integer
        datecreated:
          type: string
        deadline:
          type: string
      type: object
    model.DataCenterEnvironment:
      properties:
        category:
          type: string
        datacenterenvironment:
          type: string
        ordr:
          type: integer
        scoring_key:
          description: |-
            ScoringKey is the functions.datacenterenvironment set this environment is
            scored against. NULL means the environment is not scored (e.g. the legacy
            DECOMMISSIONED marker), so it is a pointer to distinguish that from "".
          type: string
        selectable:
          type: boolean
      type: object
    model.DataCenterMismatch:
      properties:
        cfacts_datacenterenvironment:
          description: |-
            CFACTSDataCenterEnvironment is the pipeline-reported value, trimmed but
            otherwise verbatim so the report shows exactly what CFACTS holds.
          type: string
        cfacts_value_known:
          description: |-
            CFACTSValueKnown reports whether the CFACTS value appears in the
            datacenterenvironments reference table. FALSE flags vocabulary drift:
            fixing the system would first require a new mapping row (ztmf#392), so
            those rows need different handling than a simple wrong value.
          type: boolean
        datacenterenvironment:
          description: |-
            DataCenterEnvironment is ZTMF's own (self-reported) value. NULL when the
            system has none recorded; that still counts as a mismatch, since CFACTS
            reporting a value ZTMF lacks is drift worth surfacing.
          type: string
        fismaacronym:
          type: string
        fismaname:
          type: string
        fismasystemid:
          type: integer
        opdiv_id:
          type: integer
        synced_at:
          type: string
      type: object
    model.Event:
      properties:
        action:
          description: the action they took
          type: string
        createdat:
          description: at what date and time
          type: string
        payload:
          description: incoming data
        type:
          description: on what resource
          type: string
        userid:
          description: who initiated the event
          type: string
      type: object
    model.FismaSystem:
      properties:
        cloud_service_model:
          type: string
        cloud_system:
          type: string
        cloud_vendor:
          type: string
        component:
          type: string
        datacallcontact:
          type: string
        datacenterenvironment:
          type: string
        decommissioned:
          type: boolean
        decommissioned_by:
          type: string
        decommissioned_date:
          type: string
        decommissioned_notes:
          type: string
        divisionname:
          type: string
        fips:
          type: string
        fismaacronym:
          type: string
        fismaname:
          type: string
        fismasubsystem:
          type: string
        fismasystemid:
          type: integer
        fismauid:
          type: string
        goco_coco_gogo:
          type: string
        groupacronym:
          type: string
        groupname:
          type: string
        hva:
          type: string
        isso_name:
          type: string
        issoemail:
          type: string
        legacy:
          type: string
        opdiv_id:
          type: integer
        reactivated_by:
          type: string
        reactivated_date:
          type: string
        reactivation_notes:
          type: string
        sdl_sync_enabled:
          type: boolean
        system_operator:
          type: string
        system_owner:
          type: string
        system_owner_email:
          type: string
        system_type:
          type: string
        target_maturity_justification:
          type: string
        target_maturity_tier:
          description: |-
            Risk-based target maturity (#398). NULL = no ISSO has asserted a target
            yet; the UI presents the Advanced default. Written only via
            SaveTargetMaturity, never through Save().
          type: string
      type: object
    model.Function:
      properties:
        datacenterenvironment:
          type: string
        description:
          type: string
        function:
          type: string
        functionid:
          type: integer
        order:
          type: integer
        pillarid:
          type: integer
        questionid:
          type: integer
      type: object
    model.FunctionOption:
      properties:
        description:
          type: string
        functionid:
          type: integer
        functionoptionid:
          type: integer
        optionname:
          type: string
        score:
          type: integer
      type: object
    model.MassEmail:
      properties:
        body:
          type: string
        datesent:
          type: string
        group:
          type: string
        massemailid:
          type: integer
        subject:
          type: string
      type: object
    model.OpDiv:
      properties:
        active:
          type: boolean
        code:
          type: string
        insights_enabled:
          description: |-
            InsightsEnabled gates whether system_enrichment (ZTMF Insights) is served
            for systems in this OpDiv. Pointer for the same reason as IsParent/Active:
            an update that omits it must leave the column untouched, not reset it to
            false (which would silently disable enrichment for an enabled OpDiv).
          type: boolean
        is_parent:
          description: |-
            IsParent and Active are pointers so an update can distinguish "not supplied"
            (nil, leave the column untouched) from an explicit false. With a non-pointer
            bool, any update that omits the field defaults to false: omitting is_parent
            would demote the HHS parent OpDiv (which drives HHS-wide authorization), and
            omitting active would silently deactivate an active OpDiv.
          type: boolean
        name:
          type: string
        opdiv_id:
          type: integer
      type: object
    model.Pillar:
      properties:
        order:
          type: integer
        pillar:
          type: string
        pillarid:
          type: integer
      type: object
    model.PillarScore:
      properties:
        pillar:
          type: string
        pillarid:
          type: integer
        score:
          type: number
        tier:
          type: string
      type: object
    model.Question:
      properties:
        function:
          $ref: '#/components/schemas/model.Function'
        notesprompt:
          type: string
        order:
          type: integer
        pillar:
          $ref: '#/components/schemas/model.Pillar'
        pillarid:
          type: integer
        question:
          type: string
        questionid:
          type: integer
      type: object
    model.QuestionViewInput:
      properties:
        datacallid:
          type: integer
        fismasystemid:
          type: integer
        questionid:
          type: integer
        readonly:
          description: |-
            ReadOnly is true when the caller opened the question in a read-only
            session. It decides whether this view's dwell counts as viewer time
            (true) or editor time (false) in the time-spent analytics.
          type: boolean
      type: object
    model.Score:
      properties:
        datacallid:
          type: integer
        datecalculated:
          type: number
        fismasystemid:
          type: integer
        functionoption:
          $ref: '#/components/schemas/model.FunctionOption'
        functionoptionid:
          type: integer
        last_edited_at:
          type: string
        last_edited_by:
          $ref: '#/components/schemas/model.AuditRef'
        notes:
          type: string
        notes_is_ai_summary:
          type: boolean
        scoreid:
          type: integer
      type: object
    model.ScoreAggregate:
      properties:
        datacallid:
          type: integer
        fismasystemid:
          type: integer
        pillarscores:
          items:
            $ref: '#/components/schemas/model.PillarScore'
          type: array
          uniqueItems: false
        systemscore:
          type: number
        systemtier:
          type: string
      type: object
    model.ScoreDiff:
      properties:
        changed_at:
          type: string
        changed_by:
          $ref: '#/components/schemas/model.AuditRef'
        fismasystemid:
          type: integer
        from:
          $ref: '#/components/schemas/model.ScoreDiffSide'
        function:
          type: string
        functionid:
          type: integer
        question:
          type: string
        to:
          $ref: '#/components/schemas/model.ScoreDiffSide'
      type: object
    model.ScoreDiffSide:
      properties:
        functionoptionid:
          type: integer
        notes:
          type: string
        notes_is_ai_summary:
          type: boolean
        optionname:
          type: string
        score:
          type: integer
        scoreid:
          type: integer
      type: object
    model.ScoreProgress:
      properties:
        fismasystemid:
          type: integer
        lastupdatedat:
          description: |-
            LastUpdatedAt is the most recent edit event across the system's answers
            in this data call; nil when nothing has been touched this cycle. This is
            a legitimately observational use of the events table (audit timeline),
            kept even though the counts no longer read events.
          type: string
        questionsanswered:
          description: |-
            QuestionsAnswered is the number of distinct applicable functions that
            have an answer row in this data call, regardless of whether it was
            touched this cycle. Counted from the same applicable-function set as
            QuestionsExpected, so it can never exceed it. This is the answered/total
            count a historical (closed) data call reports - carried-forward answers
            count here even though they do not count as QuestionsUpdated.
          type: integer
        questionsexpected:
          description: |-
            QuestionsExpected is the number of questionnaire functions applicable to
            the system, resolved through the datacenterenvironments scoring
            vocabulary (the same join the questionnaire and the score aggregation
            use, so the denominator matches what an ISSO actually sees).
          type: integer
        questionsupdated:
          description: |-
            QuestionsUpdated is the number of distinct functions whose answer in
            this data call reached status = 'done' (genuinely saved this cycle) AND
            is still applicable to the system's current environment. Counted from
            the same applicable-function set as QuestionsExpected, so it can never
            exceed it. Read from the persisted scores.status column, not from the
            events audit log.
          type: integer
        updatedsincestart:
          description: |-
            UpdatedSinceStart is derivable (QuestionsUpdated > 0) but kept because
            it answers the ticket's literal question - "has this system updated
            since the start of the data call" - by name in the response, so a
            consumer rendering a boolean chip never touches the numeric fields.
          type: boolean
      type: object
    model.SystemEnrichment:
      properties:
        fisma_uuid:
          type: string
        payload:
          type: object
        synced_at:
          type: string
      type: object
    model.SystemInsight:
      properties:
        fismasystemid:
          type: integer
        payload:
          type: object
        questionid:
          type: integer
        synced_at:
          type: string
      type: object
    model.TargetMaturityInput:
      properties:
        target_maturity_justification:
          type: string
        target_maturity_tier:
          type: string
      type: object
    model.User:
      properties:
        assignedopdivids:
          items:
            type: integer
          type: array
          uniqueItems: false
        deleted:
          type: boolean
        email:
          type: string
        fullname:
          type: string
        identity_provider:
          type: string
        role:
          type: string
        userid:
          type: string
      type: object
    model.UserFismaSystem:
      properties:
        fismasystemid:
          type: integer
        userid:
          type: string
      type: object
    model.UserOpDiv:
      properties:
        granted_by:
          type: string
        opdiv_id:
          type: integer
        userid:
          type: string
      type: object
  securitySchemes:
    bearerAuth:
      in: header
      name: Authorization
      type: apiKey
externalDocs:
  description: ""
  url: ""
info:
  description: API for the Zero Trust Maturity Framework (ZTMF).
  title: ZTMF API
  version: 1.0.0
openapi: 3.1.0
paths:
  /auth/logout:
    post:
      description: Clears the ZTMF application session cookie and the ALB OIDC session
        cookies, ending the session. Unauthenticated so an already-expired session
        can still be cleared. Does not perform IdP-side single logout.
      responses:
        "204":
          description: Session cleared
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/auth.errorBody'
          description: Forbidden
      summary: Log out
      tags:
      - auth
  /auth/lookup:
    get:
      description: 'Unauthenticated pre-auth lookup the landing page uses to route
        a browser to the correct IdP login path. Unknown, unprovisioned, and soft-deleted
        emails all return a null idp, so it cannot be used to enumerate accounts.
        This is the one public route: it deliberately has no bearerAuth security.'
      parameters:
      - description: Email address to resolve
        in: query
        name: email
        required: true
        schema:
          type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-controller_idpLookupResponse'
          description: OK
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Bad Request
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      summary: Resolve the identity provider for an email
      tags:
      - auth
  /datacalls:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-array_model_DataCall'
          description: OK
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: List all data calls
      tags:
      - datacalls
    post:
      parameters:
      - description: Data call ID (for update)
        in: path
        name: datacallid
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/model.DataCall'
                description: Data call to save
                summary: body
        description: Data call to save
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-model_DataCall'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Bad Request
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Create or update a data call
      tags:
      - datacalls
  /datacalls/{datacallid}:
    get:
      parameters:
      - description: Data call ID
        in: path
        name: datacallid
        required: true
        schema:
          type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-model_DataCall'
          description: OK
        "404":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Not Found
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Get a data call by ID
      tags:
      - datacalls
    put:
      parameters:
      - description: Data call ID (for update)
        in: path
        name: datacallid
        schema:
          type: integer
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
              - $ref: '#/components/schemas/model.DataCall'
                description: Data call to save
                summary: body
        description: Data call to save
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-model_DataCall'
          description: Created
        "400":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Bad Request
        "403":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Forbidden
        "500":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Create or update a data call
      tags:
      - datacalls
  /datacalls/{datacallid}/export:
    get:
      parameters:
      - description: Data call ID
        in: path
        name: datacallid
        required: true
        schema:
          type: integer
      - description: FISMA system IDs to filter by
        in: query
        name: fsids
        schema:
          items:
            type: integer
          type: array
      responses:
        "200":
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
          description: xlsx spreadsheet of the data call's answers
        "500":
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Internal Server Error
      security:
      - bearerAuth: []
      summary: Export a data call's answers as an xlsx spreadsheet
      tags:
      - datacalls
  /datacalls/{datacallid}/export/timespent:
    get:
      parameters:
      - description: Data call ID
        in: path
        name: datacallid
        required: true
        schema:
          type: integer
      - description: FISMA system IDs to filter by
        in: query
        name: fsids
        schema:
          items:
            type: integer
          type: array
      responses:
        "200":
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
          description: xlsx spreadsheet of the data call's time-spent analytics
        "400":
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                $ref: '#/components/schemas/controller.apiResponse-any'
          description: Bad Request
        "500":
