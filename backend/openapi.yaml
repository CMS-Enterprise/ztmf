        '500':
          $ref: '#/components/responses/ServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    DataCall:
      type: object
      properties:
        datacallid:
          type: integer
          format: int32
        datacall:
          type: string
        datecreated:
          type: string
          format: date-time
        deadline:
          type: string
          format: date-time
      required:
        - datacall
        - deadline
    FismaSystem:
      type: object
      properties:
        fismasystemid:
          type: integer
          format: int32
        fismauid:
          type: string
        fismaacronym:
          type: string
        fismaname:
          type: string
        fismasubsystem:
          type: string
          nullable: true
        component:
          type: string
          nullable: true
        groupacronym:
          type: string
          nullable: true
        groupname:
          type: string
          nullable: true
        divisionname:
          type: string
          nullable: true
        datacenterenvironment:
          type: string
          nullable: true
        datacallcontact:
          type: string
          nullable: true
        issoemail:
          type: string
          nullable: true
        sdl_sync_enabled:
          type: boolean
          description: Controls whether this system is included in SDL/Snowflake sync. Existing systems default to true; new systems default to false (opt-in).
        decommissioned:
          type: boolean
          description: Whether the system has been decommissioned
        decommissioned_date:
          type: string
          format: date-time
          nullable: true
          description: Date the system was decommissioned
        decommissioned_by:
          type: string
          nullable: true
          description: User ID of the admin who decommissioned the system
        decommissioned_notes:
          type: string
          nullable: true
          description: Notes about why the system was decommissioned
        reactivated_by:
          type: string
          nullable: true
          description: User ID of the admin who reactivated the system after decommission
        reactivated_date:
          type: string
          format: date-time
          nullable: true
          description: Date the system was last reactivated
        reactivation_notes:
          type: string
          nullable: true
          description: Notes about why the system was reactivated
        opdiv_id:
          type: integer
          format: int32
          nullable: true
          description: |
            OpDiv that owns this system. References opdivs.opdiv_id. Defaults
            to CMS when a request body omits the field (transitional behavior
            for existing CMS provisioning paths). HHS OpDiv systems are
            provisioned with this set explicitly via the onboarding workbook
            importer.
      required:
        - fismauid
        - fismaacronym
        - fismaname
    User:
      type: object
      properties:
        userid:
          type: string
        email:
          type: string
          format: email
        fullname:
          type: string
        role:
          type: string
          description: |
            Multi-OpDiv role taxonomy. The legacy values ADMIN and
            READONLY_ADMIN were removed in Stage D of the multi-OpDiv
            migration; they map to OWNER and HHS_READONLY_ADMIN respectively.
          enum:
            - OWNER
            - HHS_ADMIN
            - HHS_READONLY_ADMIN
            - OPDIV_ADMIN
            - OPDIV_READONLY_ADMIN
            - ISSO
            - ISSM
        deleted:
          type: boolean
        identity_provider:
          type: string
          description: |
            IdP that authenticates this user. okta for CMS, entra for
            HHS / OpDiv users. Managed by the application; not user-editable.
          enum: [okta, entra]
        assignedopdivids:
          type: array
          nullable: true
          items:
            type: integer
            format: int32
          description: |
            OpDivs the user holds a grant for, sourced from users_opdivs.
            Populated on per-user detail responses (GET /users/current,
            GET /users/{userid}); always null on the list endpoint
            (GET /users) because the extra join is skipped there. Frontend
            list views must not infer "no grants" from a null on the list
            response - call the detail endpoint to inspect a user's grants.
      required:
        - email
        - fullname
        - role
    OpDiv:
      type: object
      properties:
        opdiv_id:
          type: integer
          format: int32
          description: Surrogate primary key.
        code:
          type: string
          description: Short code (e.g. HHS, CMS, CDC, FDA, NIH).
        name:
          type: string
          description: Official division name.
        is_parent:
          type: boolean
          description: TRUE only for the HHS parent row.
        active:
          type: boolean
          description: Inactive OpDivs are retained for historical references but hidden from default queries.
      required:
        - opdiv_id
        - code
        - name
        - is_parent
        - active
    OpDivInput:
      type: object
      description: Request body for creating or updating an OpDiv (OWNER only).
      properties:
        code:
          type: string
          maxLength: 16
          description: Short code, 1-16 chars, unique among active OpDivs.
        name:
          type: string
          maxLength: 128
          description: Official division name, 1-128 chars.
        is_parent:
          type: boolean
          description: TRUE only for a department/parent row.
        active:
          type: boolean
          description: >-
            Honored on update only (set false to deactivate). Ignored on create;
            a new OpDiv is always created active.
      required:
        - code
        - name
    UserFismaSystem:
      type: object
      properties:
        userid:
          type: string
        fismasystemid:
          type: integer
          format: int32
      required:
        - userid
        - fismasystemid
    UserOpDiv:
      type: object
      properties:
        userid:
          type: string
        opdiv_id:
          type: integer
          format: int32
        granted_by:
          type: string
          nullable: true
          description: userid of the admin who granted the membership.
      required:
        - userid
        - opdiv_id
    Score:
      type: object
      properties:
        scoreid:
          type: integer
          format: int32
        fismasystemid:
          type: integer
          format: int32
        datecalculated:
          type: number
          format: double
        notes:
          type: string
          nullable: true
          maxLength: 2000
        functionoptionid:
          type: integer
          format: int32
        datacallid:
          type: integer
          format: int32
        last_edited_at:
          type: string
          format: date-time
          nullable: true
          description: >-
            RFC3339 timestamp of the most recent write to this score row.
            Null only for rows inserted outside the event-tracking write path
            (seed data); every API-driven save records an event.
        last_edited_by:
          allOf:
            - $ref: '#/components/schemas/AuditRef'
          nullable: true
          description: >-
            Identifies the user who performed the most recent write. Authz
            for these fields follows the score row itself; if you can read
            the score, you can read its editor.
      required:
        - fismasystemid
        - functionoptionid
        - datacallid
    AuditRef:
      type: object
      description: >-
        Standard "who touched this row" reference embedded on per-resource
        audit fields (last_edited_by, future created_by/decommissioned_by).
        Inherits authz from the resource that carries it.
      properties:
        userid:
          type: string
          format: uuid
          description: User UUID. Stable identifier even if name/email/role change.
        name:
          type: string
          description: Display name from users.fullname.
        email:
          type: string
        role:
          type: string
          # Canonical role taxonomy lives in backend/internal/model/users.go
          # (IsAdmin / IsOwner / IsHHSAdmin / IsOpDivAdmin role predicates).
          # When a new role is added there, update this enum AND
          # validations.go in lockstep -- openapi has drifted from code
          # twice in this repo, so this comment is the canary.
          enum:
            - OWNER
            - HHS_ADMIN
            - HHS_READONLY_ADMIN
            - OPDIV_ADMIN
            - OPDIV_READONLY_ADMIN
            - ISSM
            - ISSO
      required:
        - userid
    ScoreAggregate:
      type: object
      properties:
        datacallid:
          type: integer
          format: int32
        fismasystemid:
          type: integer
          format: int32
        systemscore:
          type: number
          format: double
          description: >-
            Overall system maturity score on the HHS-aligned 1.0 to 5.0 scale.
            Computed as the simple average of the per-pillar scores. A system
            whose every question is unanswered lands at exactly 1.0
            (Not Assessed).
        systemtier:
          type: string
          description: >-
            Tier label derived from systemscore. Boundaries: Optimal >= 4.1,
            Advanced >= 3.1, Initial >= 2.1, Traditional >= 1.01, otherwise
            Not Assessed.
          enum:
            - Optimal
            - Advanced
            - Initial
            - Traditional
            - Not Assessed
        pillarscores:
          type: array
          description: Optional pillar breakdown (only present when include_pillars=true)
          items:
            $ref: '#/components/schemas/PillarScore'
    PillarScore:
      type: object
      properties:
        pillarid:
          type: integer
          format: int32
        pillar:
          type: string
          description: Name of the pillar
        score:
          type: number
          format: double
          description: >-
            Pillar maturity score on the HHS-aligned 1.0 to 5.0 scale. A
            pillar with no answered questions lands at exactly 1.0; a pillar
            with every question at Optimal lands at 5.0.
        tier:
          type: string
          description: >-
            Tier label derived from score, using the same thresholds as
            systemtier.
          enum:
            - Optimal
            - Advanced
            - Initial
            - Traditional
            - Not Assessed
    Question:
      type: object
      properties:
        questionid:
          type: integer
          format: int32
        question:
          type: string
        notesprompt:
          type: string
        order:
          type: integer
        pillarid:
          type: integer
          format: int32
        pillar:
          $ref: '#/components/schemas/Pillar'
        function:
          $ref: '#/components/schemas/Function'
      required:
        - question
        - notesprompt
        - order
        - pillarid
    Pillar:
      type: object
      properties:
        pillarid:
          type: integer
          format: int32
        pillar:
          type: string
        order:
          type: integer
    Function:
      type: object
      properties:
        functionid:
          type: integer
          format: int32
        function:
          type: string
        description:
          type: string
        datacenterenvironment:
          type: string
        order:
          type: integer
        questionid:
          type: integer
          format: int32
          nullable: true
        pillarid:
          type: integer
          format: int32
      required:
        - function
        - description
        - datacenterenvironment
        - pillarid
    FunctionOption:
      type: object
      properties:
        functionoptionid:
          type: integer
          format: int32
        functionid:
          type: integer
          format: int32
        score:
          type: integer
          format: int32
        optionname:
          type: string
        description:
          type: string
    SystemEnrichment:
      type: object
      description: Generic per-system enrichment payload. The payload shape is opaque to the core API and owned by the enrichment pipeline.
      properties:
        fisma_uuid:
          type: string
        payload:
          type: object
          description: Opaque JSON document produced by the enrichment pipeline; returned verbatim.
          additionalProperties: true
        synced_at:
          type: string
          format: date-time
      required:
        - fisma_uuid
        - payload
        - synced_at
    Event:
      type: object
      properties:
        userid:
          type: string
        action:
          type: string
        type:
          type: string
        createdat:
          type: string
          format: date-time
        payload:
          type: object
    MassEmail:
      type: object
      properties:
        massemailid:
          type: integer
        datesent:
          type: string
          format: date-time
          nullable: true
        subject:
          type: string
        body:
          type: string
        group:
          type: string
          enum: [ISSO, ISSM, DCC, ALL, ADMIN]
      required:
        - subject
        - body
        - group
    Answer:
      type: object
      properties:
        datacall:
          type: string
        fismasystemid:
          type: integer
          format: int32
        fismaacronym:
          type: string
        datacenterenvironment:
          type: string
        pillar:
          type: string
        question:
          type: string
        function:
          type: string
        description:
          type: string
        optionname:
          type: string
        score:
          type: integer
        notes:
          type: string
