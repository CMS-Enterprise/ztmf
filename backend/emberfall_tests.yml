        fismasystemid: 1001
        functionoptionid: 1
        datacallid: 5
        notes: "delegate audit answer - assigned system"
    expect:
      status: 201
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            fismasystemid: 1001
            functionoptionid: 1
            last_edited_by:
              email: "Delegate.User@nowhere.xyz"
              role: "SYSTEM_DELEGATE"

  # Delegate CANNOT mark a system it is NOT assigned to (Shield Gen 1003) complete.
  # (The assigned-system mark-complete path is exercised by the ISSO/admin suites;
  # re-marking an already-enrolled system is a 404 by the endpoint's INSERT ...
  # ON CONFLICT DO NOTHING semantics, independent of role, so it is not asserted here.)
  - url: http://localhost:8080/api/v1/datacalls/5/fismasystems/1003
    method: PUT
    headers:
      <<: *delegateHeaders
    expect:
      status: 403

  # Delegate CANNOT write an answer for an unassigned system (Shield Gen 1003).
  - url: http://localhost:8080/api/v1/scores
    method: POST
    headers:
      <<: *delegateHeaders
      content-type: "application/json"
    body:
      json:
        fismasystemid: 1003
        functionoptionid: 1
        datacallid: 5
        notes: "delegate write to unassigned system - should be blocked"
    expect:
      status: 403

  # Delegate CAN read scores for its assigned system (1001).
  - url: http://localhost:8080/api/v1/scores/aggregate?fismasystemid=1001&include_pillars=true
    method: GET
    headers:
      <<: *delegateHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"

  # Delegate reading an UNASSIGNED system (Shield Gen, 1003) gets empty data, not
  # 403 - same system-scoped list behavior as ISSO.
  - url: http://localhost:8080/api/v1/scores/aggregate?fismasystemid=1003&include_pillars=true
    method: GET
    headers:
      <<: *delegateHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"

  # Delegate is locked out of the admin surface: audit trail 403.
  - url: http://localhost:8080/api/v1/events
    method: GET
    headers:
      <<: *delegateHeaders
    expect:
      status: 403

  # Delegate is locked out of user management: list 403.
  - url: http://localhost:8080/api/v1/users
    method: GET
    headers:
      <<: *delegateHeaders
    expect:
      status: 403

  # Delegate cannot create users (write blocked).
  - url: http://localhost:8080/api/v1/users
    method: POST
    headers:
      <<: *delegateHeaders
      content-type: "application/json"
    body:
      json:
        email: "blocked@example.com"
        fullname: "Blocked User"
        role: "ISSO"
    expect:
      status: 403

  # ==========================================================================
  # OpDiv-scoped RBAC enforcement (feature/opdiv-rbac-enforcement)
  # Fixtures: EMPIRE OpDiv systems 1001-1004, REBELLION OpDiv systems 1005-1006.
  # opDivAdminHeaders / opDivReadonlyHeaders hold the EMPIRE grant only, so every
  # REBELLION touch must 403 (writes) or be excluded (reads). Uses known fixture
  # ids rather than captured ids - Emberfall cannot template underscore keys.
  # ==========================================================================

  # OPDIV_ADMIN authenticates and is reported as the scoped tier.
  - url: http://localhost:8080/api/v1/users/current
    method: GET
    headers:
      <<: *opDivAdminHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            email: "Opdiv.Admin@empire.test"
            role: "OPDIV_ADMIN"

  # OPDIV_ADMIN can list systems (scoped server-side to their OpDivs).
  - url: http://localhost:8080/api/v1/fismasystems
    method: GET
    headers:
      <<: *opDivAdminHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"

  # OPDIV_ADMIN can read an in-scope EMPIRE system (1002).
  - url: http://localhost:8080/api/v1/fismasystems/1002
    method: GET
    headers:
      <<: *opDivAdminHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"

  # OPDIV_ADMIN gets 403 reading an out-of-scope REBELLION system (1005).
  - url: http://localhost:8080/api/v1/fismasystems/1005
    method: GET
    headers:
      <<: *opDivAdminHeaders
    expect:
      status: 403

  # OPDIV_ADMIN gets 403 editing an out-of-scope REBELLION system (1005).
  - url: http://localhost:8080/api/v1/fismasystems/1005
    method: PUT
    headers:
      <<: *opDivAdminHeaders
      content-type: "application/json"
    body:
      json:
        <<: *fismaSystemData
    expect:
      status: 403

  # OPDIV_ADMIN gets 403 decommissioning an out-of-scope REBELLION system (1006).
  - url: http://localhost:8080/api/v1/fismasystems/1006
    method: DELETE
    headers:
      <<: *opDivAdminHeaders
    expect:
      status: 403

  # OPDIV_ADMIN gets 403 reactivating an out-of-scope REBELLION system (1005).
  - url: http://localhost:8080/api/v1/fismasystems/1005/reactivate
    method: PUT
    headers:
      <<: *opDivAdminHeaders
    expect:
      status: 403

  # OPDIV_ADMIN gets 403 scoring an out-of-scope REBELLION system (1006).
  - url: http://localhost:8080/api/v1/scores
    method: POST
    headers:
      <<: *opDivAdminHeaders
      content-type: "application/json"
    body:
      json:
        fismasystemid: 1006
        functionoptionid: 1
        datacallid: 5
        notes: "cross-OpDiv score attempt - must be blocked"
    expect:
      status: 403

  # OPDIV_ADMIN gets 403 marking an out-of-scope REBELLION system (1006) complete.
  # datacallid=4 (FY2025) is a literal; if datacalls are renumbered, update here too.
  - url: http://localhost:8080/api/v1/datacalls/4/fismasystems/1006
    method: PUT
    headers:
      <<: *opDivAdminHeaders
    expect:
      status: 403

  # OPDIV_ADMIN may NOT mint an OWNER (tier escalation blocked).
  - url: http://localhost:8080/api/v1/users
    method: POST
    headers:
      <<: *opDivAdminHeaders
      content-type: "application/json"
    body:
      json:
        email: "escalation.attempt@empire.test"
        fullname: "Should Be Forbidden"
        role: "OWNER"
    expect:
      status: 403

  # OPDIV_ADMIN may NOT mint an HHS_ADMIN either.
  - url: http://localhost:8080/api/v1/users
    method: POST
    headers:
      <<: *opDivAdminHeaders
      content-type: "application/json"
    body:
      json:
        email: "escalation.attempt2@empire.test"
        fullname: "Should Be Forbidden"
        role: "HHS_ADMIN"
    expect:
      status: 403

  # OPDIV_ADMIN gets 403 on the cross-OpDiv audit trail (/events unscoped-only).
  - url: http://localhost:8080/api/v1/events
    method: GET
    headers:
      <<: *opDivAdminHeaders
    expect:
      status: 403

  # OPDIV_ADMIN gets 403 sending mass email (unscoped write admins only).
  - url: http://localhost:8080/api/v1/massemails
    method: POST
    headers:
      <<: *opDivAdminHeaders
      content-type: "application/json"
    body:
