tests:
  # Authentication Tests
  - url: http://localhost:8080/api/v1/users/current
    method: GET
    expect:
      status: 401
      body:
        json:
          code: "UNAUTHORIZED"
  
  - url: http://localhost:8080/api/v1/users/current
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            email: "Test.User@nowhere.xyz"
            role: "OWNER"
            identity_provider: "okta"

  # Pre-auth IdP lookup - unauthenticated; routes the landing page to the
  # correct ALB login path. No Authorization header on these by design.
  - url: "http://localhost:8080/api/v1/auth/lookup?email=Test.User@nowhere.xyz"
    method: GET
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            idp: "okta"

  - url: "http://localhost:8080/api/v1/auth/lookup?email=Grand.Admiral.Thrawn@chiss.empire"
    method: GET
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            idp: "entra"

  # Case-insensitive match: lowercased input resolves the mixed-case fixture.
  - url: "http://localhost:8080/api/v1/auth/lookup?email=test.user@nowhere.xyz"
    method: GET
    expect:
      status: 200
      body:
        json:
          data:
            idp: "okta"

  # Unknown email returns a null idp - identical shape to a provisioned user we
  # decline to route, so the endpoint is not an account-enumeration oracle.
  - url: "http://localhost:8080/api/v1/auth/lookup?email=nobody@nowhere.xyz"
    method: GET
    expect:
      status: 200
      body:
        json:
          data:
            idp: null

  # A soft-deleted user must look identical to an unknown email (null idp),
  # so the endpoint cannot reveal that a deactivated account existed.
  # Captain.Needa is seeded with deleted=true.
  - url: "http://localhost:8080/api/v1/auth/lookup?email=Captain.Needa@executor.empire"
    method: GET
    expect:
      status: 200
      body:
        json:
          data:
            idp: null

  # Missing email is a malformed request, rejected before any lookup.
  - url: "http://localhost:8080/api/v1/auth/lookup"
    method: GET
    expect:
      status: 400

  # Logout - unauthenticated (must clear an already-expired session), POST-only.
  # No Authorization header and no Origin by design: a request with no Origin is
  # treated as same-origin, so this succeeds and returns 204.
  - url: "http://localhost:8080/api/v1/auth/logout"
    method: POST
    expect:
      status: 204

  # A cross-origin forced-logout is rejected by the same-origin CSRF check.
  - url: "http://localhost:8080/api/v1/auth/logout"
    method: POST
    headers:
      Origin: "https://evil.example.com"
    expect:
      status: 403
      body:
        json:
          code: "FORBIDDEN_ORIGIN"

  # OpDivs Endpoint - reference list used by frontend selectors
  - url: http://localhost:8080/api/v1/opdivs
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"

  # OpDiv CRUD is OWNER-only. A non-owner (ISSO) is forbidden.
  - url: http://localhost:8080/api/v1/opdivs
    method: POST
    headers:
      <<: *issoHeaders
      content-type: "application/json"
    body:
      json:
        code: "NOPE"
        name: "Should Be Forbidden"
    expect:
      status: 403

  # OWNER creates an OpDiv; it comes back active with a server-assigned id.
  - id: createOpDiv
    url: http://localhost:8080/api/v1/opdivs
    method: POST
    headers:
      <<: *commonHeaders
      content-type: "application/json"
    body:
      json:
        code: "TESTOD"
        name: "Test OpDiv"
        is_parent: false
    expect:
      status: 201
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            code: "TESTOD"
            name: "Test OpDiv"
            active: true

  # Note: the PUT update/deactivate path uses the same SaveOpDiv handler and is
  # covered by the create case above plus the OWNER-only unit test. Emberfall's
  # response templater cannot substitute the underscore-keyed opdiv_id from the
  # create response, so a capture-dependent PUT case is omitted here.

  # DataCalls Endpoints
  - id: createDataCall
    url: http://localhost:8080/api/v1/datacalls
    method: POST
    headers:
      <<: *commonHeaders
      content-type: "application/json"
    body:
      json:
        <<: *dataCallData
    expect:
      status: 201
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            <<: *dataCallData
  
  - url: http://localhost:8080/api/v1/datacalls/latest
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            <<: *dataCallData
  
  - url: "http://localhost:8080/api/v1/datacalls/{{.createDataCall.Response.data.datacallid}}"
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            <<: *dataCallData
  
  - url: "http://localhost:8080/api/v1/datacalls/{{.createDataCall.Response.data.datacallid}}"
    method: PUT
    headers:
      <<: *commonHeaders
      content-type: "application/json"
    body:
      json:
        <<: *updatedDataCallData
    expect:
      status: 204
  
  - url: "http://localhost:8080/api/v1/datacalls/{{.createDataCall.Response.data.datacallid}}"
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            <<: *updatedDataCallData
  
  - url: http://localhost:8080/api/v1/datacalls
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"

  # FISMA Systems Endpoints
  - id: createFismaSystem
    url: http://localhost:8080/api/v1/fismasystems
    method: POST
    headers:
      <<: *commonHeaders
      content-type: "application/json"
    body:
      json:
        <<: *fismaSystemData
    expect:
      status: 201
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            <<: *fismaSystemData

  - url: "http://localhost:8080/api/v1/fismasystems/{{.createFismaSystem.Response.data.fismasystemid}}"
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            <<: *fismaSystemData
  
  - url: "http://localhost:8080/api/v1/fismasystems/{{.createFismaSystem.Response.data.fismasystemid}}"
    method: PUT
    headers:
      <<: *commonHeaders
      content-type: "application/json"
    body:
      json:
        <<: *updatedFismaSystemData
    expect:
      status: 204
  
  - url: "http://localhost:8080/api/v1/fismasystems/{{.createFismaSystem.Response.data.fismasystemid}}"
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            <<: *updatedFismaSystemData

  # Toggle sdl_sync_enabled to true and verify it round-trips
  - url: "http://localhost:8080/api/v1/fismasystems/{{.createFismaSystem.Response.data.fismasystemid}}"
    method: PUT
    headers:
      <<: *commonHeaders
      content-type: "application/json"
    body:
      json:
        <<: *updatedFismaSystemData
        sdl_sync_enabled: true
    expect:
      status: 204

  - url: "http://localhost:8080/api/v1/fismasystems/{{.createFismaSystem.Response.data.fismasystemid}}"
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            <<: *updatedFismaSystemData
            sdl_sync_enabled: true

  # Test A — OWNER writes HHS fields on create, reads them back, then does a
  # partial PUT (HHS fields omitted). The partial PUT must NOT wipe the stored
  # HHS values (the conditional SetMap fix in model/fismasystems.go).
  - id: createFismaSystemWithHHS
    url: http://localhost:8080/api/v1/fismasystems
    method: POST
    headers:
      <<: *commonHeaders
      content-type: "application/json"
    body:
      json:
        <<: *fismaSystemWithHHSData
    expect:
      status: 201
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            <<: *hhsExpected

  - url: "http://localhost:8080/api/v1/fismasystems/{{.createFismaSystemWithHHS.Response.data.fismasystemid}}"
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            <<: *hhsExpected

  # Partial PUT — core fields only, HHS fields intentionally omitted.
  # Before the fix this would have written NULL to all 11 HHS columns.
  - url: "http://localhost:8080/api/v1/fismasystems/{{.createFismaSystemWithHHS.Response.data.fismasystemid}}"
    method: PUT
    headers:
      <<: *commonHeaders
      content-type: "application/json"
    body:
      json:
        <<: *updatedFismaSystemData
    expect:
      status: 204

  - url: "http://localhost:8080/api/v1/fismasystems/{{.createFismaSystemWithHHS.Response.data.fismasystemid}}"
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            <<: *hhsExpected

  # Test A2 — clearing values (ztmf#442). On the same system (still holding the
  # HHS values Test A preserved), an OWNER PUT that sends hva as "" clears it to
  # NULL, and a blanked issoemail no longer 400s the whole save. HHS fields still
  # omitted from the body stay untouched (partial-PUT contract from Test A).
  - url: "http://localhost:8080/api/v1/fismasystems/{{.createFismaSystemWithHHS.Response.data.fismasystemid}}"
    method: PUT
    headers:
      <<: *commonHeaders
      content-type: "application/json"
    body:
      json:
        <<: *updatedFismaSystemData
        issoemail: "" # blanked email must not 400 (it clears to NULL)
        hva: "" # cleared metadata field -> NULL
    expect:
      status: 204

  - url: "http://localhost:8080/api/v1/fismasystems/{{.createFismaSystemWithHHS.Response.data.fismasystemid}}"
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            hva: null # "" cleared the column to NULL, not "" or unchanged
            issoemail: null # blanked email cleared to NULL, no 400
            system_owner: "Grand Moff Tarkin" # omitted HHS field preserved
            cloud_system: "Yes" # omitted HHS field preserved

  # Test B — Scoped admin RBAC gate.
  #
  # Part 1: opDivAdmin POSTs a system with HHS fields → clearHHSMetadata
  # strips them; created record has null HHS fields.
  # opdiv_id 15 = EMPIRE OpDiv, position 15 in the seed INSERT sequence
  # (_test_data_empire.sql). If this fails with 403, the seed order changed.
  - id: createFismaSystemScopedAdmin
    url: http://localhost:8080/api/v1/fismasystems
    method: POST
    headers:
      <<: *opDivAdminHeaders
      content-type: "application/json"
    body:
      json:
        <<: *fismaSystemWithHHSData
        opdiv_id: 15
    expect:
      status: 201
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            hva: null
            fips: null
            system_type: null
            cloud_system: null
            cloud_service_model: null
            cloud_vendor: null
            system_operator: null
            goco_coco_gogo: null
            system_owner: null
            system_owner_email: null
            legacy: null
            isso_name: null

  # Part 2: OWNER sets HHS fields on system 1002 (EMPIRE OpDiv — opDivAdmin
  # holds a write grant for this system).
  - url: "http://localhost:8080/api/v1/fismasystems/1002"
    method: PUT
    headers:
      <<: *commonHeaders
      content-type: "application/json"
    body:
      json:
        <<: *system1002WithHHSData
    expect:
      status: 204

  # Part 3: opDivAdmin PUTs system 1002 with different HHS values →
  # copyHHSMetadata overwrites them back to the stored values.
  - url: "http://localhost:8080/api/v1/fismasystems/1002"
    method: PUT
    headers:
      <<: *opDivAdminHeaders
      content-type: "application/json"
    body:
      json:
        <<: *system1002WithHHSData
        hva: "OVERWRITE ATTEMPT"
        system_owner: "Impostor"
    expect:
      status: 204

  # GET confirms OWNER's values survived the scoped admin PUT.
  - url: "http://localhost:8080/api/v1/fismasystems/1002"
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"
      body:
        json:
          data:
            <<: *hhsExpected

  - url: http://localhost:8080/api/v1/fismasystems
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 200
      headers:
        content-type: "application/json"

  # - url: "http://localhost:8080/api/v1/fismasystems/{{.createFismaSystem.Response.data.fismasystemid}}/questions"
  #   method: GET
  #   headers:
  #     <<: *commonHeaders
  #   expect:
