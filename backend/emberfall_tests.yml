        body: "blocked"
    expect:
      status: 403

  # OPDIV_READONLY_ADMIN can read (scoped) but every write is blocked.
  - url: http://localhost:8080/api/v1/fismasystems
    method: GET
    headers:
      <<: *opDivReadonlyHeaders
