  - url: http://localhost:8080/api/v1/users?role=adnim
    method: GET
    headers:
      <<: *commonHeaders
    expect:
      status: 400
      headers:
        content-type: "application/json"
      body:
        json:
          error: "invalid input"
          data: 
            role: "adnim"
  
  # list users with partial email should return a list of users
  - url: http://localhost:8080/api/v1/users?email=example.com
    method: GET
    headers:
