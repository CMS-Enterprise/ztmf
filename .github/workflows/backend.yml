name: Backend

on:
  workflow_call:
    inputs:
      environment:
        type: string
        description: environment to deploy to
        required: true
        
jobs:
  build:
    name: Build and Smoke Test
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    outputs:
      shaShort: ${{ steps.revParse.outputs.shaShort }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Get Commit SHA
        id: revParse
        run: echo "shaShort=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Docker - Build
        run: docker buildx build --platform linux/amd64 --tag ${{ secrets.ECR_REPO_URL }}:${{ steps.revParse.outputs.shaShort }} --load ./backend 

      - name: Snyk - Test Image
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          image: "${{ secrets.ECR_REPO_URL }}:${{ steps.revParse.outputs.shaShort }}"
          args: --severity-threshold=high --file=./backend/Dockerfile --policy-path=./backend/.snyk
      
      - name: Start API and Postgres Containers
        uses: hoverkraft-tech/compose-action@v2.0.2
        with:
          compose-file: ./backend/actions-compose.yml
        env:
          API_IMAGE_URI: "${{ secrets.ECR_REPO_URL }}:${{ steps.revParse.outputs.shaShort }}"
          
          # for postgre container
          POSTGRES_DB: ztmf
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: localDev

          # for api container and debug launch config
          PORT: 8080
          DB_ENDPOINT: localhost
          DB_PORT: 5432
          DB_NAME: ztmf
          DB_USER: admin
          DB_PASS: localDev 
          DB_POPULATE: "/src/backend/_test_data_empire.sql"
          AUTH_HS256_SECRET: "zeroTrust"
          AUTH_HEADER_FIELD: "Authorization"
          WORKSPACE: ${{ github.workspace }}

      - name: Emberfall Smoke Tests
        uses: aquia-inc/emberfall@main
        with:
          version: 0.4.1
          file: ./backend/emberfall_tests.yml

      - name: AWS - Get Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLEARN }}
          role-duration-seconds: 900
          aws-region: us-east-1
              
      - name: Docker - Login
        run: aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REPO_URL }}
  
      - name: Docker - Push
        run: docker push ${{ secrets.ECR_REPO_URL }}:${{ steps.revParse.outputs.shaShort }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.1'

      - name: Lambda - Build (Kion Key Rotate)
        # Kion rotate Lambda runs on Graviton (arm64) with provided.al2023 runtime.
        # The other Lambdas in this workflow are still x86_64/al2; those are tracked
        # for a separate upgrade PR (see ztmf-misc follow-up issue).
        run: |
          set -e
          cd backend
          echo "Building Kion Key Rotate Lambda (arm64)..."
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -a -ldflags '-extldflags "-static"' -o bootstrap ./cmd/lambda-kion-key-rotate/.
          zip kion-key-rotate-deployment-${{ steps.revParse.outputs.shaShort }}.zip bootstrap
          rm bootstrap
          ls -la kion-key-rotate-deployment-${{ steps.revParse.outputs.shaShort }}.zip

      - name: Lambda - Build (Cert Rotation)
        run: |
          set -e
          cd backend
          echo "Building Cert Rotation Lambda..."
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -a -ldflags '-extldflags "-static"' -o bootstrap ./cmd/lambda-cert-rotation/.
          zip cert-rotation-deployment-${{ steps.revParse.outputs.shaShort }}.zip bootstrap
          rm bootstrap
          ls -la cert-rotation-deployment-${{ steps.revParse.outputs.shaShort }}.zip

      - name: Lambda - Upload to S3
        run: |
          set -e
          ENV_LOWER=$(echo "${{ inputs.environment }}" | tr '[:upper:]' '[:lower:]')
          LAMBDA_BUCKET="ztmf-lambda-deployments-${ENV_LOWER}"
          SHA="${{ steps.revParse.outputs.shaShort }}"
          echo "Uploading Lambda packages to bucket: $LAMBDA_BUCKET"

          # Kion Key Rotate Lambda
          aws s3 cp backend/kion-key-rotate-deployment-${SHA}.zip s3://$LAMBDA_BUCKET/kion-key-rotate-deployment-${SHA}.zip
          aws s3 cp backend/kion-key-rotate-deployment-${SHA}.zip s3://$LAMBDA_BUCKET/kion-key-rotate-deployment-latest.zip

          # Cert Rotation Lambda
          aws s3 cp backend/cert-rotation-deployment-${SHA}.zip s3://$LAMBDA_BUCKET/cert-rotation-deployment-${SHA}.zip
          aws s3 cp backend/cert-rotation-deployment-${SHA}.zip s3://$LAMBDA_BUCKET/cert-rotation-deployment-latest.zip

          echo "All Lambda deployment packages uploaded successfully"

      - name: Lambda - Update Function Code
        run: |
          set -e
          ENV_LOWER=$(echo "${{ inputs.environment }}" | tr '[:upper:]' '[:lower:]')
          LAMBDA_BUCKET="ztmf-lambda-deployments-${ENV_LOWER}"
          SHA="${{ steps.revParse.outputs.shaShort }}"

          # Update each Lambda function if it exists
          for FUNC_PAIR in \
            "ztmf-kion-key-rotate-${ENV_LOWER}:kion-key-rotate-deployment-${SHA}.zip" \
            "ztmf-cert-rotation-${ENV_LOWER}:cert-rotation-deployment-${SHA}.zip"; do

            LAMBDA_FUNCTION="${FUNC_PAIR%%:*}"
            S3_KEY="${FUNC_PAIR#*:}"

            echo "Checking Lambda function: $LAMBDA_FUNCTION"
            if aws lambda get-function --function-name $LAMBDA_FUNCTION >/dev/null 2>&1; then
              echo "Updating: $LAMBDA_FUNCTION with $S3_KEY"
              aws lambda update-function-code \
                --function-name $LAMBDA_FUNCTION \
                --s3-bucket $LAMBDA_BUCKET \
                --s3-key $S3_KEY
              echo "Updated successfully: $LAMBDA_FUNCTION"
            else
              echo "Function doesn't exist yet: $LAMBDA_FUNCTION (will be created by infrastructure workflow)"
            fi
          done
        
      - name: AWS - SSM Put Parameter
        # Guard against IMPL environment misconfiguration: if PARAMETER_NAME
        # is copy-pasted from DEV (ztmf_api_tag) into IMPL, every impl CI
        # run silently overwrites dev's image pointer and dev's next apply
        # deploys the impl image. Assert per-env expected value before put.
        env:
          ENV: ${{ inputs.environment }}
          PARAMETER_NAME: ${{ secrets.PARAMETER_NAME }}
        run: |
          set -e
          ENV_LOWER=$(echo "$ENV" | tr '[:upper:]' '[:lower:]')
          case "$ENV_LOWER" in
            dev|prod)
              EXPECTED="ztmf_api_tag"
              ;;
            impl)
              EXPECTED="ztmf-impl_api_tag"
              ;;
            *)
              echo "Unrecognized environment: $ENV" >&2
              exit 1
              ;;
          esac
          if [ "$PARAMETER_NAME" != "$EXPECTED" ]; then
            echo "PARAMETER_NAME mismatch for $ENV: got '$PARAMETER_NAME', expected '$EXPECTED'." >&2
            echo "Fix the GitHub repo Environment '$ENV' secret PARAMETER_NAME." >&2
            exit 1
          fi
          aws ssm put-parameter --name "$PARAMETER_NAME" --value "${{ steps.revParse.outputs.shaShort }}" --overwrite

      # Deployment of the latest image will happen with terraform apply during infrastructure deploy
