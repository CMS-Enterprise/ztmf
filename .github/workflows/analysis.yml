name: Analysis

on:
  workflow_call:

jobs:
  # Detect whether this change touches Go/backend files so the Go-specific
  # Analysis jobs (lint go, snyk test) can be skipped on infra-only PRs. Mirrors
  # the backend diff signal the orchestration workflows use to gate the Backend
  # deploy. Outside the PR-open context (a merge to main/prod, or any push) the
  # signal is forced non-empty so the Go scans always run there.
  changes:
    name: detect backend changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      backend: ${{ steps.backend.outputs.backend }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for changes in backend/
        id: backend
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ] || [ "${{ github.event.pull_request.merged }}" = "true" ]; then
            echo "backend=always" >> $GITHUB_OUTPUT
          else
            echo "backend=$(git --no-pager diff --name-only "origin/${{ github.base_ref }}" -- backend/ .github/workflows/backend.yml .github/workflows/analysis.yml | grep -E '\.go$|go\.mod$|\.sum$|Dockerfile|workflows/(backend|analysis)\.yml' | head -n 1)" >> $GITHUB_OUTPUT
          fi

  Lint-Go:
    name: lint go
    needs: changes
    if: ${{ needs.changes.outputs.backend != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: LINT backend/
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          working-directory: backend

  OpenAPI-Spec-Check:
    name: openapi spec up to date
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      # Regenerate the spec from the Go annotations (same command as
      # `make generate-openapi`) and fail if it differs from what's committed.
      # The swag version is pinned via the tool directive in backend/go.mod, so
      # CI and local generation produce byte-identical output.
      - name: Regenerate OpenAPI spec
        working-directory: backend
        run: go tool swag init -g cmd/api/main.go --dir ./ --parseInternal --v3.1 --outputTypes yaml -o ./ && mv swagger.yaml openapi.yaml

      - name: Fail if openapi.yaml is out of date
        working-directory: backend
        run: |
          if ! git diff --exit-code openapi.yaml; then
            echo "::error::backend/openapi.yaml is out of date. Run 'make generate-openapi' and commit the result."
            exit 1
          fi

      # The drift check above only proves the spec matches the annotations, not
      # that the annotations are correct. Redocly lint enforces correctness
      # (e.g. every operation must declare security). Rule relaxations live in
      # backend/redocly.yaml; the one intentional public route is acknowledged
      # in backend/.redocly.lint-ignore.yaml. Pinned to match local generation.
      - name: Lint OpenAPI spec (Redocly)
        working-directory: backend
        run: docker run --rm -v "$PWD":/work -w /work redocly/cli:2.32.2 lint openapi.yaml

  Lint-Terraform:
    name: lint terraform
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: TFLINT setup
        uses: terraform-linters/setup-tflint@v4

      - name: TFLINT version
        run: tflint --version

      - name: TFLINT init
        run: tflint --chdir=infrastructure/ --init

      - name: TFLINT run
        run: tflint  --chdir=infrastructure/ -f compact

  Snyk-Test:
    name: snyk test
    needs: changes
    if: ${{ needs.changes.outputs.backend != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Install Snyk CLI
        uses: snyk/actions/setup@master

      - name: Snyk test
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --print-deps --severity-threshold=high --show-vulnerable-paths=all ./backend
      
  Snyk-Code-Test:
    name: snyk code test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: code test
        uses: snyk/actions/golang@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high --show-vulnerable-paths=all ./backend
      
  Snyk-IaC-Test:
    name: snyk iac test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
      
      - name: iac test
        uses: snyk/actions/golang@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: iac test
          args: --severity-threshold=high ./infrastructure
