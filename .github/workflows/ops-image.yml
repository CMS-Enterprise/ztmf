name: Ops Image

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: environment to publish to
        required: true
        options:
          - DEV
          - PROD
  push:
    branches:
      - main
    paths:
      - 'backend/ops/**'
      - '.github/workflows/ops-image.yml'

jobs:
  build:
    name: Build and Push Ops Image
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ github.event_name == 'workflow_dispatch' && fromJSON(format('["{0}"]', inputs.environment)) || fromJSON('["DEV", "PROD"]') }}
    environment: ${{ matrix.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get Commit SHA
        id: revParse
        run: echo "shaShort=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: AWS - Get Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLEARN }}
          role-duration-seconds: 900
          aws-region: us-east-1

      - name: ECR - Resolve Ops Repo URL
        id: repo
        run: |
          URL=$(aws ecr describe-repositories --repository-names ztmf/ops --query 'repositories[0].repositoryUri' --output text)
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Docker - Build
        run: docker buildx build --platform linux/amd64 --tag ${{ steps.repo.outputs.url }}:${{ steps.revParse.outputs.shaShort }} --load ./backend/ops

      - name: Docker - Login
        run: aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ steps.repo.outputs.url }}

      - name: Docker - Push
        run: docker push ${{ steps.repo.outputs.url }}:${{ steps.revParse.outputs.shaShort }}

      - name: AWS - SSM Put Parameter
        run: aws ssm put-parameter --name ztmf_ops_tag --value ${{ steps.revParse.outputs.shaShort }} --overwrite
