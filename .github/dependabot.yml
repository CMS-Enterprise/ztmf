version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current. Without this, pinned digests
  # rot and only land security/feature fixes when someone bumps them by hand.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: chore(ci)
